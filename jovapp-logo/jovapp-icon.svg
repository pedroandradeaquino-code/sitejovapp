<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#7ED957" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="128" height="128" fill="#FFFFFF" rx="24"/>
  <!-- Lupa centralizada -->
  <g transform="translate(64, 50)" filter="url(#green-glow)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#7ED957" stroke-width="9" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#000000" stroke-width="1" stroke-opacity="0.5"/>
    <path d="M22,22 L42,42" stroke="#7ED957" stroke-width="9" stroke-linecap="round"/>
    <path d="M22,22 L42,42" stroke="#000000" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Reflexo -->
    <path d="M-20,-15 Q0,-5 20,-15" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>
  </g>
  <!-- Capelo sobre a lupa -->
  <g transform="translate(64, 12) rotate(8)">
    <path d="M-24,-6 L24,-6 L26,0 L-26,0 Z" fill="#000000"/>
    <path d="M-28,0 L28,0 L22,14 L-22,14 Z" fill="#000000"/>
    <circle cx="0" cy="14" r="2" fill="#7ED957"/>
    <rect x="-1" y="14" width="2" height="8" fill="#7ED957"/>
  </g>
</svg>